    Research Projects:
      - name: "Bio-inspired Legged Robot with Multi-modal Locomotion and Manipulation"
        date: "2025.04 – 2026.01"
        source: "MoE Integrated Platform Project (教育部集成攻关大平台)"
        description: >
          Research on heterogeneous reconfiguration technology for legged robots.
          Designed extended command space and VAE-based state estimation for multi-modal
          motion control with reinforcement learning training and sim-to-real deployment.
          Achieved complex terrain walking, fall recovery, quadruped crawling, and
          vehicle riding/dismounting on legged robots.

      - name: "Humanoid Robot for Firefighting Scenarios"
        date: "2023.07 – 2024.12"
        source: "Beijing Municipal Science & Technology Plan (北京市科技计划)"
        role: "PhD Student Lead"
        description: >
          Developed foot-terrain interaction walking control algorithms under computational constraints.
          Designed a hierarchical planning-control framework ("Mapping-Optimization-Reconstruction")
          with dimensionality-reduced manifold motion modeling and safe trajectory optimization.
          Achieved stable omnidirectional walking on stairs, slopes, and low obstacles.
          Published 1 first-author paper in Q1 TOP journal.

      - name: "Autonomous Mobile and Dexterous Manipulation Humanoid Robot"
        date: "2022.09 – 2023.12"
        source: "Beijing Municipal Science & Technology Plan (北京市科技计划)"
        description: >
          Designed system integration and software architecture based on RTOS and EtherCAT.
          Built multi-process communication architecture achieving 0.25-1kHz real-time
          force-position hybrid control. Developed wheel-legged transformation subsystem
          with minimal modification design. Proposed phase-decomposition-guided PSO trajectory
          optimization for stable wheel-legged mode switching on unstructured terrain.
          Published 1 first-author paper in Q1 TOP journal.

      - name: "Primate-inspired High-mobility Robot"
        date: "2021.09 – 2022.06"
        source: "National Key R&D Program (国家重点研发计划)"
        description: >
          Developed crawling motion planning based on Central Pattern Generators (CPG).
          Designed multi-frequency decoupled planning architecture for bipedal walking
          with QP-based foothold planning and MPC-based trajectory planning.
          Achieved omnidirectional walking and dynamic obstacle avoidance.
          1 granted patent, 1 published EI paper.

      - name: "Special-Purpose Humanoid Robot System Delivery"
        date: "2023.06 – 2025.03"
        source: "Industry Project (北京理工华汇智能科技有限公司)"
        description: >
          Led motion control algorithm development and product delivery at BIT-affiliated
          robotics company. Delivered complete special-purpose humanoid robot system with
          control software for field deployment in Xinjiang. Led live demonstrations at
